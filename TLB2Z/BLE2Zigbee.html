<script>

var bluetoothDevice, gattServer, cmdCharacteristic, infoService;

var devInfo = {};
var devSrv = {};
var devMacs = [{},{},{}];
var devKeys = [{},{},{}];

var isConnected = false;
var start_read = false;
//Connection values
var connectRetries = 0;

var $ = function(id) { return document.getElementById(id);}

const isEmpty = str => !str.trim().length;

function resetVariables() {
	start_read = false;
	gattServer = null;
	mainService = null;
	cmdCharacteristic = null;
	$('btnDisconnect').disabled = true;
}

function handleError(text) {
	showError(text);
	resetVariables();
	if ((bluetoothDevice != null) && (connectRetries < 5)) {
		addLog("Переподключение " + connectRetries + " из " + 5);
		$('btnDisconnect').disabled = true;
		$('btnReconnect').disabled  = true;
		connectRetries++;
		doConnect();
	} else {
		addLog("Подключиться не удалось!");
		connectRetries = 0;
		// disconnect();
		$('btnConnect').disabled = false;
	}
}

function connect() {
	var deviceOptions = {
		optionalServices: [0x1800, 0x180a, 0x180f, 0x181a, 0xfffe],
		services: [0x1800, 0x180a, 0x180f, 0x181a, 0xfffe],
		acceptAllDevices: true };
	const namePrefix = $('inpNamePrefix').value;
	if (namePrefix) {
		deviceOptions.acceptAllDevices = false;
		deviceOptions.filters = namePrefix.split(",")
			.map((x) => ({ namePrefix: x }));
	}
	console.log(deviceOptions);
	if (bluetoothDevice != null) bluetoothDevice.gatt.disconnect();
	resetVariables();
	bluetoothDevice = null;
	$('btnReconnect').disabled = true;
	if(typeof(navigator.bluetooth) != "undefined") {
	    $('btnConnect').disabled = true;
	    showState("Поиск устройств");
	    connectRetries = 0;
		//console.log()
	    navigator.bluetooth.requestDevice(deviceOptions).then(device => {
	        bluetoothDevice = device;
	        bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
			//addLog("Connecting to: " + bluetoothDevice.name);
	        doConnect();
	    }).catch(handleError);
	} else {
		showError("Browser doesn't support BLE API");
	}
}

function disconnect() {
	addLog("Отключение");
	isConnected = false;
	if (bluetoothDevice != null)
		bluetoothDevice.gatt.disconnect();
}

function reconnect() {
	addLog("Переподключение");
	if (bluetoothDevice != null) {
		bluetoothDevice.gatt.disconnect();
		isConnected = false;
	}
	$('btnConnect').disabled   = true;
	$('btnReconnect').disabled = true;
	connectRetries = 0;
	doConnect();
}


function getStrCharacteristic(infosrv, suuid) {
 return new Promise((resolve, reject) => {
	infosrv.getCharacteristic(suuid).then(characteristic => {
		characteristic.readValue().then(value => {
			return resolve(new TextDecoder("utf-8").decode(value));
		}).catch(error => {console.log(error);	return resolve(null); });
	}).catch(error => {console.log(error);	return resolve(null); });
})};

function getDevInfo(devInfEnabled) {
	return new Promise((resolve, reject) => {
	devInfo.nrstr = null;
	devInfo.srstr = null;
	devInfo.frstr = null;
	devInfo.hrstr = null;
	devInfo.vrstr = null;
	if (devInfEnabled == true) {
		gattServer.getPrimaryService(0x180a).then(service => {
			console.log("Найден Device Information Service");
			infoService = service;
			return getStrCharacteristic(infoService, 0x2a24).then(value => {
				devInfo.nrstr = value;
				//DOMException: getCharacteristic(s) called with blocklisted UUID. https://goo.gl/4NeimX
				//return getStrCharacteristic(infoService, 0x2a25).then(value => {
				//	devInfo.srstr = value;
					return getStrCharacteristic(infoService, 0x2a26).then(value => {
						devInfo.frstr = value;
						return getStrCharacteristic(infoService, 0x2a27).then(value => {
							devInfo.hrstr = value;
							return getStrCharacteristic(infoService, 0x2a28).then(value => {
								devInfo.vrstr = value;
								return resolve(devInfo.flg);
							}).catch(error => { console.log(error); return resolve(null);});
						}).catch(error => { console.log(error); return resolve(null);});
					}).catch(error => { console.log(error); return resolve(null);});
				//}).catch(error => { console.log(error); return resolve(null);});
			}).catch(error => { console.log(error); return resolve(null);});
		}).catch(error => { console.log(error); return resolve(null);});
	} else	return resolve(null);
	}).catch(error => { console.log(error); return resolve(null);});
}

function b2zConnect(info_flg) {
	return getDevInfo(info_flg).then(_ => {
		if(devInfo.nrstr != null)
			addLog("Model: "+devInfo.nrstr);
		if(devInfo.srstr != null)
			addLog("Serial: "+devInfo.srstr);
		if(devInfo.frstr != null)
			addLog("Firmware: "+devInfo.frstr);
		if(devInfo.hrstr != null)
			addLog("Hardware: "+devInfo.hrstr);
		if(devInfo.vrstr != null)
			addLog("Software: "+devInfo.vrstr);
	 	return gattServer.getPrimaryService(0xfffe);
	}).then(service => {
		console.log("Найден Main Service");
		mainService = service;
		cmdCharacteristic = null;
		return mainService.getCharacteristic(0xff01);
	}).then(characteristic => {
		console.log("Найдена CMD Characteristic");
		cmdCharacteristic = characteristic;
		return cmdCharacteristic.addEventListener('characteristicvaluechanged', event => parseBlkCustom(event.target.value));
	}).then(_ => {
		return cmdCharacteristic.startNotifications();
	}).then(_ => {
		return cmdCharacteristic.readValue();
	}).then(value => {
		showState("Устройство подключено.");
		isConnected = true;
		$('btnDisconnect').disabled = false;
		disableControls(false);
		start_read = true;
		return cmdCharacteristic.writeValue(new Uint8Array([0x10,0])); // get measure
	}).catch(handleError);
}

function doConnect() {
	isConnected = false;
	showState("Ожидание соединения с " + bluetoothDevice.name)
	return bluetoothDevice.gatt.connect().then(server => {
		console.log("Найден GATT сервер");
		gattServer = server;
		gattServer.getPrimaryServices().then(services => {
			let cmd = false;
			let info  = false;
			for (var i = 0; i < services.length; i++) {
				console.log("Services: " + services[i].uuid);
				if (services[i].uuid == "0000180a-0000-1000-8000-00805f9b34fb")
					info = true;
				else if (services[i].uuid == "0000fffe-0000-1000-8000-00805f9b34fb")
					cmd = true;
			}
			if(cmd)
				return b2zConnect(true);
		    addLog("Выбрано неверное устройство!");
		    bluetoothDevice.gatt.disconnect();
		    connectRetries = 10;
		    return null;
		}).catch(handleError);
	}).catch(handleError);
}


function disableControls(state) {
	$('btnGetMAC0').disabled = state;
	$('btnSetMAC0').disabled = state;
	$('btnGetBindKey0').disabled = state;
	$('btnSetBindKey0').disabled = state;
	$('btnGetMAC1').disabled = state;
	$('btnSetMAC1').disabled = state;
	$('btnGetBindKey1').disabled = state;
	$('btnSetBindKey1').disabled = state;
	$('btnGetMAC2').disabled = state;
	$('btnSetMAC2').disabled = state;
	$('btnGetBindKey2').disabled = state;
	$('btnSetBindKey2').disabled = state;
	$('btnSendCommand').disabled = state;
	$('btnGetOnOffCmd').disabled = state;
	$('btnSetOnOffCmd').disabled = state;
	$('btnGetIllumi').disabled = state;
	$('btnSetIllumi').disabled = state;
}

function onDisconnected() {
	isConnected = false;
	resetVariables();
	showState('Устройство отключено.');
    $('btnConnect').disabled   = false;
	$('btnReconnect').disabled = false;
	// $('tabConfig').style.display = "none";
	disableControls(true);
}

function addLog(logTXT) {
	console.log(logTXT)
	var time = new Date().toLocaleTimeString();
	var logString = time + ": " + logTXT;
	$("log").innerHTML += logString + "<br>";
}

function showState(text) {
	let s = "Состояние: " + text;
	$("lblStatus").className = "shadowbox";
	$("lblStatus").innerHTML = s;
	addLog(text);
}

function showError(text) {
//    console.log("Status: " + status);
	let s = "Ошибка: " + text;
	$("lblStatus").className = "shadowerror";
	$("lblStatus").innerHTML = s;
	addLog(text);
}

function showProgress(text) {
	$("lblStatus").className = "shadowprogress";
	$("lblStatus").innerHTML = text;
}

function clearLog() {
	$("log").innerHTML = "";
}

function decimalToHex(d, padding) {
	var hex = Number(d).toString(16);
	while (hex.length < 4) {
		hex = "0" + hex;
	}
	return hex;
}

function hexToBytes(hex) {
	for (var bytes = [], c = 0; c < hex.length; c += 2)
		bytes.push(parseInt(hex.substr(c, 2), 16));
	return new Uint8Array(bytes);
}

function bytesToHex(data) {
	return new Uint8Array(data).reduce(function(memo, i) {
		return memo + ("0" + i.toString(16)).slice(-2);
	}, "");
}

function hex(number, len) {
	var str = (number.toString(16)).toUpperCase();
	while (str.length < len) str = '0' + str;
	return str;
}

function hexToBytes(hex) {
	for (var bytes = [], c = 0; c < hex.length; c += 2)
		bytes.push(parseInt(hex.substr(c, 2), 16));
	return new Uint8Array(bytes);
}

function dump(ar, len) {
	let s = '';
	for(let i=0; i < len; i++) {
		s += hex(ar[i],2);
	}
	return s;
}

function dump8(ar, len) {
	let s = '';
	for(let i=0; i < len; i++) {
		s += hex(ar.getUint8(i),2);
	}
	return s;
}

function hex2ascii(hexx) {
	var hex = hexx.toString();
	var str = '';
	for (var i = 0;
		(i < hex.length && hex.substr(i, 2) !== '00'); i += 2)
		str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
	return str;
}

var sendCharMain = function(data, characteristic) {
	return new Promise(function(resolve, reject) {
		console.log("Send: " + data);
		characteristic.writeValue(hexToBytes(data)).then(function(character) {
			resolve("OK");
		}).catch(function(err) {
			reject("Ошибка при отправке данных");
		});
	});
}

function writeCmd(data) {
	if(cmdCharacteristic) {
		len = data.length;
		if((len > 0) && (len <= 20)) {
			let blk = new Uint8Array(data);
			cmdCharacteristic.writeValue(blk);
		} else
		    showError('Ошибка, длина команды от 1 до 20 байт!');
	}
}

function sendCommand() {
	let data = hexToBytes($('inpCmdData').value);
	if(data.length != 0 && data.length <= 20)
		writeCmd(data);
	else
	    console.log('Должно быть от 1 до 20 hex байт!');
}

function parseBlkCustom(value) {
	let len = value.byteLength;
	if(len == 0) return;
	//console.log('blk: ' + dump8(value, len));
	let blkId = value.getUint8(0);
	if((blkId == 0x00) && (len > 3)) {	// CMD_ID_DEVID Get dev id, version, services
		devSrv.board = value.getUint8(1);
		devSrv.version = value.getUint16(2, true);
		devSrv.app_build = value.getUint8(2);
		devSrv.app_release = value.getUint8(3);
		addLog("Device info # hw: " + hex(devSrv.board,2)
		   + ", sw: " + ((devSrv.app_release&0xF)>>4) + "."
		   + (devSrv.app_release&0xF) + "."
		   + ((devSrv.app_build&0xF)>>4) + "."
		   + (devSrv.app_build&0xF));
	} else if(blkId == 0x33 && len > 7) { // Measure
		let nn = value.getUint8(1);
		if(nn >= 0 && nn < 3) {
	    	let temp = value.getInt16(2, true);
	    	let humi = value.getUint16(4, true);
	    	let lbat = value.getUint8(6);
	    	let vbat = value.getUint8(7);
	    	let s = "";
	    	if(temp != -32768) { temp /= 100.0; s +="T:" + temp.toFixed(2)+"°C"; };
	    	if(humi != 65535) { humi /= 100.0; if(s != "") s += ", "; s +="RH:"+humi.toFixed(2)+"%"; };
	    	if(lbat != 255) { lbat /= 2.0; if(s != "") s += ", "; s +="Bat:"+lbat.toFixed(1)+"%"; };
	    	if(vbat != 255) { vbat /= 10.0; if(s != "") s += ", "; s +="Vbat:"+vbat.toFixed(1)+"V"; };
	    	let ill = 0xffffffff;
	    	let trg = 0xff;
	    	if(len == 9) trg = value.getUint8(8);
	    	else if(len == 12) ill = value.getUint32(8, true);
	    	else if(len > 12) { ill = value.getUint32(8, true); trg = value.getUint8(12); };
	    	if(ill 	!= 0xffffffff) { if(s != "") s += ", "; s +="Illum:"+ill+"lx"; };
	    	if(trg != 0xff) { if(s != "") s += ", "; s +="Trg:"+trg; };
			$("lblMeasure"+nn).innerHTML = s;
			console.log("Dev"+(nn+1)+" "+s);
		}
	} else if(blkId == 0x18 && len > 1) { // Get/set bindkeys
		let nn = value.getUint8(1);
		if(nn >= 0 && nn < 3) {
			if(len > 17) {
				devKeys[nn].cbindkey = value.buffer.slice(2,18);
				let s = bytesToHex(devKeys[nn].cbindkey,16);
				addLog("Bindkey"+ (nn+1) + " # " + s);
				$("inpBindKey"+nn).value = s;
			} else if(len == 3) {
				addLog("Bindkey"+ (nn+1) + " # не записан");
			}
			if(start_read == true) {
			  if(nn < 2) writeCmd([0x18, nn+1]);
			  else {
			    if(nn == 2 && devSrv.version >= 0x0111) writeCmd([0x19]);
				else  start_read = false;
			  }
			}
		} else {
			addLog("Ошибка чтения BindKey устройств!");
			console.log('blk: ' + dump8(value, value.byteLength));
			$("inpBindKey"+nn).value = '?';
		}
	} else if(blkId == 0x10 && len > 1) { // Get/Set MACs
		let nn = value.getUint8(1);
		if(nn >= 0 && nn < 3) {
			if(len > 7) {
				let mac = new Uint8Array(6);
				mac[0] = value.getUint8(7);
				mac[1] = value.getUint8(6);
				mac[2] = value.getUint8(5);
				mac[3] = value.getUint8(4);
				mac[4] = value.getUint8(3);
				mac[5] = value.getUint8(2);
				devMacs[nn] = mac;
				let mac_txt = bytesToHex(mac).match(/.{2}/g).join(':').toUpperCase();
	            $("inpDevMAC"+nn).value = mac_txt;
				addLog("MAC"+(nn+1)+" # "+ mac_txt);
			} else if(len == 3) {
				addLog("MAC"+ (nn+1) + " # не записан");
			}
			if(start_read == true) {
				if(nn < 2) writeCmd([0x10, nn+1]);
				else if(nn == 2) writeCmd([0x18, 0]);
			}
		} else {
			addLog("Ошибка чтения MAC устройств!");
			console.log('blk: ' + dump8(value, value.byteLength));
			$("inpDevMAC"+nn).value = '?';
		}
	} else if(blkId == 0x19 && len > 6) { // Get/set illuminance min (minLevelLx)
			console.log('blk: ' + dump8(value, value.byteLength));
			let il = [];
	    	il[0]  = value.getUint16(1, true);
	    	il[1]  = value.getUint16(3, true);
	    	il[2]  = value.getUint16(5, true);
			console.log("Motion Illuminance: " + il[0] + ", " + il[1] + ", " + il[2]);
			let ilx = [];
			if(il[0] < 0xffff) {
		    	ilx[0] = il[0] == 0 ? 0 : Math.round(10 ** ((il[0] - 1) / 10000));
				$("inpIllumi0").value = String(ilx[0]);
			} else {
				ilx[0] = "?";
				$("inpIllumi0").value = "?";
			}
			if(il[1] < 0xffff) {
		    	ilx[1] = il[1] == 0 ? 0 : Math.round(10 ** ((il[1] - 1) / 10000));
	            $("inpIllumi1").value = String(ilx[1]);
			} else {
		        ilx[1] = "?";
				$("inpIllumi1").value = "?";
			}
			if(il[2] < 0xffff) {
				ilx[2] = il[2] == 0 ? 0 : Math.round(10 ** ((il[2] - 1) / 10000));
				$("inpIllumi2").value = String(ilx[2]);
		    } else {
		        ilx[2] = "?";
			    $("inpIllumi2").value = "?";
			}
			addLog("Motion Illuminance: " + ilx[0] + ", " + ilx[1] + ", " + ilx[2] + " lx");
		    if(start_read && devSrv.version >= 0x0111) writeCmd([0x1A]);
			else start_read = false;
	} else if(blkId == 0x1A && len > 3) { 
			console.log('blk: ' + dump8(value, value.byteLength));
			let onc = [];
	    	onc[0]  = value.getUint8(1);
	    	onc[1]  = value.getUint8(2);
	    	onc[2]  = value.getUint8(3);
			addLog("On/Off command: 0x" + hex(onc[0],2) + ", 0x" + hex(onc[1],2) + ", 0x" + hex(onc[2],2));
			$("selOnOffCmd0").value = String(onc[0]);
			$("selOnOffCmd1").value = String(onc[1]);
			$("selOnOffCmd2").value = String(onc[2]);
			start_read = false;
	} else {
		console.log('blk: ' + dump8(value, value.byteLength));
		addLog('Ответ на команду (' + hex(blkId,2) + '): ' + bytesToHex(value.buffer.slice(1)));
	}
}

function getIllumi() {
	if(cmdCharacteristic != null) {
		cmdCharacteristic.writeValue(new Uint8Array([0x19])).catch(error => { addLog("getIllumi Error: " + error); });
	}
}

function getOnOffCmd() {
	if(cmdCharacteristic != null) {
		cmdCharacteristic.writeValue(new Uint8Array([0x1A])).catch(error => { addLog("getOnOff Error: " + error); });
	}
}

function getDevMAC(nn) {
	if(cmdCharacteristic != null) {
		cmdCharacteristic.writeValue(new Uint8Array([0x10,nn])).catch(error => { addLog("getMAC("+nn+") Error: " + error); });
	}
}

function getBindKey(nn) {
	if(cmdCharacteristic != null) {
		cmdCharacteristic.writeValue(new Uint8Array([0x18,nn])).catch(error => { addLog("getBindKey("+nn+") Error: " + error); });
	}
}

function setDevMAC(nn) {
	if(cmdCharacteristic != null) {
		let el = $("inpDevMAC"+nn).value;
        let macRegex = /^[0-9A-Fa-f]{12}$/;
		let mac_clean = el.replace(/[:\-.\s]/g, '');
	    if (macRegex.test(mac_clean)) {
			if(mac_clean.length == 12) {
				let mac = hexToBytes(mac_clean);
				if(mac.length == 6) {
					let mac_txt = bytesToHex(mac).match(/.{2}/g).join(':').toUpperCase();
		            $("inpDevMAC"+nn).value = mac_txt;
					let blk = new Uint8Array(8);
					blk[0] = 0x10;
					blk[1] = nn;
					blk[2] = mac[5];
					blk[3] = mac[4];
					blk[4] = mac[3];
					blk[5] = mac[2];
					blk[6] = mac[1];
					blk[7] = mac[0];
					console.log("Send cmd New MAC N"+nn+" ["+dump(blk, blk.length)+"]...");
					cmdCharacteristic.writeValue(blk).then(_ => {
						addLog("Передача нового MAC"+(nn+1)+": "+mac_txt+" ok");
					});
					return;
				}
			}
		}
		addLog("Строка MAC должна быть 6 байт в HEX виде!");
		return;
	}
}

function setBindKey(nn) {
	if(cmdCharacteristic != null) {
		let bk = $("inpBindKey"+nn).value;
		if(bk.length == 32) {
			let bkey = hexToBytes(bk);
			if(bkey.length == 16) {
				let blk = new Uint8Array(18);
				blk.set(bkey,2);
				blk[0] = 0x18;
				blk[1] = nn;
				//console.log("Send bindkey...");
				addLog("Сохранить новый BindKey"+(nn+1)+": " + bytesToHex(blk.slice(1)));
				cmdCharacteristic.writeValue(blk).catch(error => { addLog("setBindKey("+nn+") Error: " + error); });
				return;
			}
		}
		addLog("BindKey должен содержать 16 байт в HEX виде (32 символа)!");
	}
}

function setIllumi() {
	if(cmdCharacteristic != null) {
    	let l0 = parseInt($("inpIllumi0").value);
    	let l1 = parseInt($("inpIllumi1").value);
    	let l2 = parseInt($("inpIllumi2").value);
    	if(l0 != 0) {
	    	if(l0 > 0 && l0 <= 3576000) l0 = Math.round(10000*Math.log10(l0));
    		else l0 = 0xffff;
    	}
    	if(l1 != 0) {
	    	if(l1 > 0 && l1 <= 3576000) l1 = Math.round(10000*Math.log10(l1));
    		else l1 = 0xffff;
    	}
    	if(l2 != 0) {
	    	if(l2 > 0 && l2 <= 3576000) l2 = Math.round(10000*Math.log10(l2));
    		else l2 = 0xffff;
   		}
		let blk = new Uint8Array(7);
		blk[0] = 0x19;
		blk[1] = l0 & 0xff;
		blk[2] = (l0>>8) & 0xff;
		blk[3] = l1 & 0xff;
		blk[4] = (l1>>8) & 0xff;
		blk[5] = l2 & 0xff;
		blk[6] = (l2>>8) & 0xff;
		console.log("Send new level illuminance ["+dump(blk, blk.length)+"]...");
			cmdCharacteristic.writeValue(blk).then(_ => {
				addLog("Send level illuminance - ok");
		});
	}
}

function setOnOffCmd() {
	if(cmdCharacteristic != null) {
    	let l0 = parseInt($("selOnOffCmd0").value);
    	let l1 = parseInt($("selOnOffCmd1").value);
    	let l2 = parseInt($("selOnOffCmd2").value);
		let blk= new Uint8Array(4);
		blk[0] = 0x1A;
		blk[1] = l0 & 0xff;
		blk[2] = l1 & 0xff;
		blk[3] = l2 & 0xff;
		console.log("Send new OnOffCmdCode ["+dump(blk, blk.length)+"]...");
			cmdCharacteristic.writeValue(blk).then(_ => {
				addLog("Send OnOffCmdCode - ok");
		});
	}
}
